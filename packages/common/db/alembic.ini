# Alembic config for the Postgres meta-store (spec 13).
#
# The database URL is NOT hardcoded here: env.py resolves it at runtime from the
# GIT_ASSIST_META_STORE_URL environment variable (what the integration tests set),
# falling back to the empty `sqlalchemy.url` below only if a caller fills it in.

[alembic]
# Migration scripts live next to this file.
script_location = %(here)s/migrations

# Put `packages/` on sys.path so `import common` resolves when alembic runs from
# anywhere (`%(here)s` is this file's directory: packages/common/db).
prepend_sys_path = %(here)s/../..

# Resolved at runtime from GIT_ASSIST_META_STORE_URL (see migrations/env.py).
sqlalchemy.url =

# Standard logging configuration (consumed by logging.config.fileConfig).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
